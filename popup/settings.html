<!DOCTYPE html>
<html lang="en_US">
    <head>
        <meta charset="utf-8" />
        <link rel="stylesheet" href="settings.css" />
    </head>
    <body>
        <div id="popup-content">
            <div class="logo">
                <h1>Slopstagram</h1>
            </div>
            <div class="divider"></div>
            <div class="toggle-row">
                <div class="toggle-label">
                    <span>Hide clutter</span>
                    <small>Remove distracting elements</small>
                </div>
                <label class="switch">
                    <input type="checkbox" id="toggle-content">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="toggle-row">
                <div class="toggle-label">
                    <span>Force messages</span>
                    <small>Redirect to inbox</small>
                </div>
                <label class="switch">
                    <input type="checkbox" id="toggle-redirect">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div id="error-content" class="hidden">
            <div class="error">
                <p>Open Instagram to use Slopstagram.</p>
            </div>
        </div>
        <script src="settings.js"></script>
    </body>
</html>
